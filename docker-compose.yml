version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bycar_postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-bycar_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_NAME:-bycar_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bycar-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bycar_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-bycar_db}?reWriteBatchedInserts=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-admin}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-admin}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SHOW_SQL:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - bycar-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  bycar-network:
    driver: bridge