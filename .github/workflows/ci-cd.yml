name: CI/CD Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "zulu"
          cache: "maven"

      - name: Run build and tests
        run: mvn -B verify -Dcheckstyle.skip=true

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-and-test
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          test -n "$RAILWAY_TOKEN" || (echo "RAILWAY_TOKEN is not set" && exit 1)
          test -n "$RAILWAY_SERVICE" || (echo "RAILWAY_SERVICE is not set" && exit 1)

      - name: Deploy
        run: railway up --service="$RAILWAY_SERVICE" --ci

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: deploy
    env:
      APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}

    steps:
      - name: Validate healthcheck URL
        run: |
          test -n "$APP_HEALTHCHECK_URL" || (echo "APP_HEALTHCHECK_URL is not set" && exit 1)

      - name: Wait for app startup
        run: sleep 25

      - name: Run healthcheck
        run: |
          curl -fsS "$APP_HEALTHCHECK_URL"
